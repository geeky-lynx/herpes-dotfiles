# Basic & advanced bindings
bind = ALT,             TAB, cyclenext
bind = $main_mod,       Q, killactive,
bind = $main_mod,       T, exec, $terminal
bind = $main_mod,       E, exec, $file_manager
bind = $main_mod,       R, exec, $menu
bind = $main_mod,       V, exec, $clipboard
bind = $main_mod,       O, exec, $eye_filter
bind = $main_mod,       N, exec, $notifications_menu
bind = $main_mod,       L, exec, hyprlock
bind = $main_mod SHIFT, L, exec, wlogout
bind = $main_mod SHIFT, X, exec, $full_screenshot
bind = $main_mod,       X, exec, $region_screenshot

bind = $main_mod,       F, fullscreen, 
bind = $main_mod,       P, pin,
bind = $main_mod,       J, togglesplit, # dwindle
bind = $main_mod,       U, togglefloating, 
bind = $main_mod SHIFT, U, pseudo, # gonna dwindle

# Function (Fn) Media keybindings
bind = $main_mod, F2, exec, $gamemode
# bind = $main_mod, F5, exec, pavucontrol
bindl = , XF86AudioRaiseVolume, exec, pamixer --increase 5; echo $(pamixer --get-volume) > /tmp/wobpipe
bindl = , XF86AudioLowerVolume, exec, pamixer --decrease 5; echo $(pamixer --get-volume) > /tmp/wobpipe
bindl = , XF86AudioMute,        exec, $toggle_speakers
bindl = , XF86AudioMicMute,     exec, $toggle_mic
bindl = , XF86AudioPlay,        exec, playerctl play-pause
bindl = , XF86AudioPause,       exec, playerctl play-pause
bindl = , XF86AudioNext,        exec, playerctl next
bindl = , XF86AudioPrev,        exec, playerctl previous

# My laptop doesn't have Fn for play/pause, next or prev
bindl = $main_mod,       K, exec, playerctl play-pause
bindl = $main_mod,       B, exec, playerctl next
bindl = $main_mod SHIFT, B, exec, playerctl previous
    # Alternate to pamixer: wpctl

# Group bindings
bind = $main_mod,       G,   togglegroup,
bind = $main_mod,       TAB, changegroupactive, f
bind = $main_mod SHIFT, TAB, changegroupactive, b

# Window specific bindings
    # Move focus with main_mod + arrow keys
bind = $main_mod, left,  movefocus, l
bind = $main_mod, right, movefocus, r
bind = $main_mod, up,    movefocus, u
bind = $main_mod, down,  movefocus, d

    # Move windows with main_mod + Shift + arrow keys
bind = $main_mod SHIFT, left,  movewindow, l
bind = $main_mod SHIFT, right, movewindow, r
bind = $main_mod SHIFT, up,    movewindow, u
bind = $main_mod SHIFT, down,  movewindow, d

# Workspace specific bindings
    # Switch workspaces with main_mod + [0-9]
bind = $main_mod, 1, workspace, 1
bind = $main_mod, 2, workspace, 2
bind = $main_mod, 3, workspace, 3
bind = $main_mod, 4, workspace, 4
bind = $main_mod, 5, workspace, 5
bind = $main_mod, 6, workspace, 6
bind = $main_mod, 7, workspace, 7
bind = $main_mod, 8, workspace, 8
bind = $main_mod, 9, workspace, 9
bind = $main_mod, 0, workspace, 10

# Move active window to a workspace with main_mod + SHIFT + [0-9]
bind = $main_mod SHIFT, 1, movetoworkspace, 1
bind = $main_mod SHIFT, 2, movetoworkspace, 2
bind = $main_mod SHIFT, 3, movetoworkspace, 3
bind = $main_mod SHIFT, 4, movetoworkspace, 4
bind = $main_mod SHIFT, 5, movetoworkspace, 5
bind = $main_mod SHIFT, 6, movetoworkspace, 6
bind = $main_mod SHIFT, 7, movetoworkspace, 7
bind = $main_mod SHIFT, 8, movetoworkspace, 8
bind = $main_mod SHIFT, 9, movetoworkspace, 9
bind = $main_mod SHIFT, 0, movetoworkspace, 10

    # Example special workspace (scratchpad)
bind = $main_mod,       S, togglespecialworkspace, magic
bind = $main_mod SHIFT, S, movetoworkspace, special:magic

# Mouse specific bindings
    # Scroll through existing workspaces with main_mod + scroll
bind = $main_mod, mouse_down, workspace, e+1
bind = $main_mod, mouse_up,   workspace, e-1

bind = $main_mod, page_down, workspace, e-1
bind = $main_mod, page_up,   workspace, e+1

    # Move/resize windows with main_mod + LMB/RMB and dragging
bindm = $main_mod, mouse:272, movewindow
bindm = $main_mod, mouse:273, resizewindow
